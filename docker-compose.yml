version: '3.8'

services:
  web:
    build: .
    container_name: aquanube_web
    network_mode: bridge
    ports:
      - "8080:8080"
    environment:
      # Clave gratuita de Google (Gemini). Consíguela en
      # https://aistudio.google.com/app/apikey y defínela en tu entorno o en
      # un archivo .env junto a este compose. Si falta, el análisis responde 503.
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - PORT=8080
    restart: unless-stopped
