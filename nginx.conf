server {
    listen       80;
    server_name  localhost;
    root   /usr/share/nginx/html;
    index  index.html;

    # Página única: cualquier ruta (p. ej. /dashboard, /datos) sirve index.html.
    # El desplazamiento a la sección lo hace main.js según la ruta.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
